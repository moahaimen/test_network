experiment:
  data_dir: data
  workspace_root: .
  max_steps: 500
  k_paths: 3
  k_crit: 40
  lp_time_limit_sec: 20
  full_mcf_time_limit_sec: 90
  scale_probe_steps: 200
  k_crit_mode: adaptive_edges
  k_crit_fixed: 40
  k_crit_alpha_edges: 1.0
  k_crit_beta_ods: 0.05
  k_crit_min: 20
  k_crit_max: 200
  lp_runtime_budget_sec: 0.30
  split:
    train: 0.70
    val: 0.15
    test: 0.15
  regimes:
    C2: 1.3
    C3: 1.8

mgm:
  steps: 500
  seed: 42
  base_scale: 120.0
  diurnal_period: 96
  weekly_period: 672
  modulation_strength: 0.25
  noise_std: 0.08
  hotspot_frac: 0.10

topologies:
  - key: abilene
    source: sndlib
    tm_source: real
    topology_file: data/raw/topology/abilene.txt
    max_steps: 500
    topology_id: SNDLIB_ABILENE
    display_name: "Abilene Backbone (SNDlib)"
    expected_num_nodes: 12
    expected_num_edges: 30
    k_crit_mode: adaptive_edges
    k_crit_alpha_edges: 1.0
    k_crit_min: 20
    k_crit_max: 200
    lp_runtime_budget_sec: 0.30

  - key: geant
    source: sndlib
    tm_source: real
    topology_file: data/raw/topology/geant.txt
    max_steps: 500
    topology_id: SNDLIB_GEANT
